<html>
<head>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>

<body>
  <a-scene>

    <!-- Cámara con cursor -->
    <a-entity camera look-controls>
      <a-entity cursor="fuse: false; rayOrigin: mouse"
                position="0 0 -1"
                geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
                material="color: white; shader: flat">
      </a-entity>
    </a-entity>

    <!-- Imagen base del escenario -->
    <a-plane src="escenario.jpg"
             position="0 1.5 -4"
             width="6"
             height="3.5">
    </a-plane>

    <!-- ========================= -->
    <!-- HOTSPOTS IZQUIERDA (1–3) -->
    <!-- ========================= -->

    <!-- Hotspot 1 -->
    <a-sphere position="-2 2.5 -3.8" radius="0.12" color="#FF4444" id="h1"></a-sphere>
    <a-plane id="panel1" position="-2 1.5 -3.8" width="2.5" height="1" color="#222" opacity="0.85" visible="false">
      <a-text value="Escenario 1: Instrucciones de navegación\nComienza tu recorrido aquí. Lee cuidadosamente las instrucciones para una mejor experiencia." 
              align="center" color="#FFF" width="2.3" position="0 0 0.1">
      </a-text>
    </a-plane>

    <!-- Hotspot 2 -->
    <a-sphere position="-2 1.5 -3.8" radius="0.12" color="#AA44FF" id="h2"></a-sphere>
    <a-plane id="panel2" position="-2 0.5 -3.8" width="2.5" height="1" color="#222" opacity="0.85" visible="false">
      <a-text value="Escenario 2: Objetivos del recorrido\nAccede a la imagen para ver los objetivos generales y específicos." 
              align="center" color="#FFF" width="2.3" position="0 0 0.1">
      </a-text>
    </a-plane>

    <!-- Hotspot 3 -->
    <a-sphere position="-2 0.5 -3.8" radius="0.12" color="#33CC66" id="h3"></a-sphere>
    <a-plane id="panel3" position="-2 -0.5 -3.8" width="2.5" height="1" color="#222" opacity="0.85" visible="false">
      <a-text value="Escenario 3: Desafío inicial\nAccede al enlace para evaluar tu conocimiento base sobre el tema." 
              align="center" color="#FFF" width="2.3" position="0 0 0.1">
      </a-text>
    </a-plane>

    <!-- ========================= -->
    <!-- HOTSPOTS CENTRO (4–6) -->
    <!-- ========================= -->

    <!-- Hotspot 4 -->
    <a-sphere position="0 2.5 -3.8" radius="0.12" color="#FFAA00" id="h4"></a-sphere>
    <a-plane id="panel4" position="0 1.5 -3.8" width="2.5" height="1" color="#222" opacity="0.85" visible="false">
      <a-text value="Escenario 4: Antes de la presentación\nAccede al enlace para ver los tips prácticos antes de presentar." 
              align="center" color="#FFF" width="2.3" position="0 0 0.1">
      </a-text>
    </a-plane>

    <!-- Hotspot 5 -->
    <a-sphere position="0 1.5 -3.8" radius="0.12" color="#00AACC" id="h5"></a-sphere>
    <a-plane id="panel5" position="0 0.5 -3.8" width="2.5" height="1" color="#222" opacity="0.85" visible="false">
      <a-text value="Escenario 5: Durante la presentación\nAccede al video sobre Delivery memorable en YouTube." 
              align="center" color="#FFF" width="2.3" position="0 0 0.1">
      </a-text>
    </a-plane>

    <!-- Hotspot 6 -->
    <a-sphere position="0 0.5 -3.8" radius="0.12" color="#CC00AA" id="h6"></a-sphere>
    <a-plane id="panel6" position="0 -0.5 -3.8" width="2.5" height="1" color="#222" opacity="0.85" visible="false">
      <a-text value="Escenario 6: Después de la presentación\nAccede a la infografía sobre mejora continua." 
              align="center" color="#FFF" width="2.3" position="0 0 0.1">
      </a-text>
    </a-plane>

    <!-- ========================= -->
    <!-- HOTSPOTS DERECHA (7–9) -->
    <!-- ========================= -->

    <!-- Hotspot 7 -->
    <a-sphere position="2 2.5 -3.8" radius="0.12" color="#FF66AA" id="h7"></a-sphere>
    <a-plane id="panel7" position="2 1.5 -3.8" width="2.5" height="1" color="#222" opacity="0.85" visible="false">
      <a-text value="Escenario 7: Desafío final\nEvalúa cuánto aprendiste y tu nivel como presentador/a." 
              align="center" color="#FFF" width="2.3" position="0 0 0.1">
      </a-text>
    </a-plane>

    <!-- Hotspot 8 -->
    <a-sphere position="2 1.5 -3.8" radius="0.12" color="#44FFAA" id="h8"></a-sphere>
    <a-plane id="panel8" position="2 0.5 -3.8" width="2.5" height="1" color="#222" opacity="0.85" visible="false">
      <a-text value="Escenario 8: Reflexión\nCompleta la reflexión sobre tu estilo de comunicación." 
              align="center" color="#FFF" width="2.3" position="0 0 0.1">
      </a-text>
    </a-plane>

    <!-- Hotspot 9 -->
    <a-sphere position="2 0.5 -3.8" radius="0.12" color="#4488FF" id="h9"></a-sphere>
    <a-plane id="panel9" position="2 -0.5 -3.8" width="2.5" height="1" color="#222" opacity="0.85" visible="false">
      <a-text value="Escenario 9: Infografía\nAccede a las 10 reglas para presentaciones de impacto." 
              align="center" color="#FFF" width="2.3" position="0 0 0.1">
      </a-text>
    </a-plane>

    <!-- ========================= -->
    <!-- INTERACTIVIDAD -->
    <!-- ========================= -->

    <script>
      const hotspots = [
        {h: 'h1', p: 'panel1'},
        {h: 'h2', p: 'panel2'},
        {h: 'h3', p: 'panel3'},
        {h: 'h4', p: 'panel4'},
        {h: 'h5', p: 'panel5'},
        {h: 'h6', p: 'panel6'},
        {h: 'h7', p: 'panel7'},
        {h: 'h8', p: 'panel8'},
        {h: 'h9', p: 'panel9'}
      ];

      hotspots.forEach(item => {
        document.querySelector('#' + item.h).addEventListener('click', () => {
          document.querySelector('#' + item.p).setAttribute('visible', true);
        });
      });
    </script>

  </a-scene>
</body>
</html>
