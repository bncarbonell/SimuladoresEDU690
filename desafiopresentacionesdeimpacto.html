<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desafío de Presentaciones de Impacto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy: #0A0F26;
    --navy-elevated: #10173A;
    --surface: #161E48;
    --border: rgba(147, 125, 255, 0.20);
    --violet: #7C5CFF;
    --violet-dim: #5B42C4;
    --lavender: #D9D2FF;
    --white: #F5F6FC;
    --muted: #9AA3CC;
    --success: #4ADE80;
    --error: #FB7C86;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0;
    padding:0;
    background: var(--navy);
    color: var(--white);
    font-family: var(--font-body);
    min-height: 100vh;
  }

  body{
    background:
      radial-gradient(circle at 15% -10%, rgba(124,92,255,0.22), transparent 45%),
      radial-gradient(circle at 100% 110%, rgba(124,92,255,0.14), transparent 40%),
      var(--navy);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding: 32px 20px 64px;
  }

  /* ---------- Header ---------- */
  .app-header{
    width:100%;
    max-width: 760px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom: 28px;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:10px;
  }

  .brand-mark{
    width: 30px; height:30px;
    flex-shrink:0;
  }

  .brand-name{
    font-family: var(--font-display);
    font-weight:600;
    font-size: 15px;
    letter-spacing: 0.01em;
    color: var(--lavender);
  }

  .stations-nav{
    display:flex;
    gap:8px;
    align-items:center;
  }

  .station-dot{
    width:8px; height:8px;
    border-radius:50%;
    background: var(--border);
    transition: background 0.3s ease, transform 0.3s ease;
  }
  .station-dot.done{ background: var(--success); }
  .station-dot.active{ background: var(--violet); transform: scale(1.4); }

  /* ---------- Card shell ---------- */
  .stage{
    width:100%;
    max-width: 760px;
  }

  .card{
    background: linear-gradient(180deg, var(--surface), var(--navy-elevated));
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 44px 40px;
    box-shadow: 0 30px 60px -30px rgba(0,0,0,0.6);
    animation: rise 0.45s ease both;
  }

  @keyframes rise{
    from{ opacity:0; transform: translateY(14px); }
    to{ opacity:1; transform: translateY(0); }
  }

  @media (max-width: 600px){
    .card{ padding: 30px 22px; border-radius:16px; }
  }

  .eyebrow{
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--violet);
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom: 14px;
  }

  .eyebrow .source-tag{
    color: var(--muted);
    font-weight: 500;
  }

  h1{
    font-family: var(--font-display);
    font-size: 30px;
    line-height:1.22;
    margin: 0 0 12px;
    letter-spacing: -0.01em;
  }

  h2.question-text{
    font-family: var(--font-display);
    font-size: 22px;
    line-height:1.35;
    font-weight: 600;
    margin: 0 0 26px;
  }

  p.lead{
    color: var(--muted);
    font-size: 15px;
    line-height:1.6;
    margin: 0 0 26px;
  }

  .intro-desc{
    background: rgba(124,92,255,0.08);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    font-size: 14.5px;
    line-height: 1.6;
    color: var(--lavender);
    margin-bottom: 28px;
  }

  .journey-preview{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 30px;
  }

  .journey-step{
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 12px;
    text-align:left;
  }
  .journey-step .num{
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--violet);
    margin-bottom: 6px;
    display:block;
  }
  .journey-step .label{
    font-family: var(--font-display);
    font-size: 13.5px;
    font-weight: 600;
    color: var(--white);
  }
  @media (max-width: 600px){
    .journey-preview{ grid-template-columns: 1fr; }
  }

  /* ---------- Buttons ---------- */
  .btn{
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 15px;
    padding: 14px 26px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    transition: transform 0.15s ease, opacity 0.15s ease, background 0.2s ease;
  }
  .btn-primary{
    background: var(--violet);
    color: #fff;
    width: 100%;
  }
  .btn-primary:hover{ background: #8E71FF; }
  .btn-primary:disabled{
    background: rgba(124,92,255,0.25);
    color: rgba(255,255,255,0.4);
    cursor: not-allowed;
  }
  .btn-secondary{
    background: transparent;
    border: 1px solid var(--border);
    color: var(--lavender);
    width: 100%;
    margin-top: 12px;
  }
  .btn-secondary:hover{ border-color: var(--violet); }
  .btn:active{ transform: scale(0.98); }

  .btn-row{
    display:flex;
    gap: 10px;
  }
  .btn-row .btn{ margin-top:0; }
  .btn-back{
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    flex: 0 0 auto;
    width: auto;
    padding: 14px 20px;
  }
  .btn-back:hover{ border-color: var(--violet); color: var(--lavender); }

  /* ---------- Options ---------- */
  .options{
    display:flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 24px;
  }

  .option{
    text-align:left;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    color: var(--white);
    font-family: var(--font-body);
    font-size: 15px;
    line-height:1.5;
    padding: 15px 18px;
    border-radius: 12px;
    cursor: pointer;
    display:flex;
    align-items:flex-start;
    gap: 12px;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .option:hover:not(.locked){
    border-color: var(--violet);
    background: rgba(124,92,255,0.08);
  }
  .option .letter{
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 6px;
    width: 22px; height:22px;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .option.selected{
    border-color: var(--violet);
    background: rgba(124,92,255,0.12);
  }
  .option.selected .letter{ border-color: var(--violet); color: var(--violet); background: rgba(124,92,255,0.18); }
  .option.locked{ cursor: default; }

  /* ---------- Badge interstitial ---------- */
  .badge-reveal{
    text-align:center;
    padding: 12px 0 6px;
  }
  .badge-icon{
    width: 84px; height:84px;
    margin: 4px auto 22px;
  }
  .badge-name{
    font-family: var(--font-display);
    font-size: 24px;
    font-weight: 700;
    margin: 0 0 8px;
  }
  .badge-tag{
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--violet);
    margin-bottom: 18px;
  }
  .badge-copy{
    color: var(--muted);
    font-size: 14.5px;
    line-height: 1.6;
    margin-bottom: 30px;
  }

  /* ---------- Results ---------- */
  .gauge-wrap{
    display:flex;
    justify-content:center;
    margin: 6px 0 22px;
  }
  .gauge-score{
    font-family: var(--font-display);
    font-size: 34px;
    font-weight: 700;
    fill: var(--white);
  }
  .gauge-label{
    font-family: var(--font-mono);
    font-size: 11px;
    fill: var(--muted);
  }

  .badge-row{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
    margin: 8px 0 26px;
  }
  .badge-chip{
    display:flex;
    align-items:center;
    gap:7px;
    border: 1px solid var(--border);
    background: rgba(124,92,255,0.07);
    border-radius: 999px;
    padding: 7px 14px 7px 8px;
    font-size: 13px;
    font-weight:600;
    color: var(--lavender);
  }
  .badge-chip svg{ width:20px; height:20px; }

  .save-note{
    text-align:center;
    font-size: 13px;
    color: var(--muted);
    margin-top: 10px;
    min-height: 16px;
  }
  .save-note.ok{ color: var(--success); }

  footer.legal{
    max-width: 760px;
    width:100%;
    text-align:center;
    color: var(--muted);
    font-size: 12px;
    margin-top: 26px;
    line-height:1.6;
  }
</style>
</head>
<body>

<div class="app-header">
  <div class="brand">
    <svg class="brand-mark" viewBox="0 0 30 30" fill="none">
      <circle cx="15" cy="15" r="13" stroke="#7C5CFF" stroke-width="2"/>
      <path d="M9 17 L13 12 L17 15 L21 9" stroke="#D9D2FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
    <span class="brand-name">Desafío de Presentaciones de Impacto</span>
  </div>
  <div class="stations-nav" id="stationsNav" style="display:none;">
    <div class="station-dot" data-station="0"></div>
    <div class="station-dot" data-station="1"></div>
    <div class="station-dot" data-station="2"></div>
  </div>
</div>

<div class="stage" id="stage"></div>

<footer class="legal">
  Recurso educativo gamificado &middot; los resultados se guardan únicamente en este navegador
</footer>

<script>
/* ---------------------------------------------------------
   CONTENIDO
--------------------------------------------------------- */
const SECTIONS = [
  {
    key: "antes",
    num: "01",
    title: "Antes de presentar",
    badgeName: "Claridad Estratégica",
    badgeCopy: "Sabes definir el propósito y filtrar el contenido antes de abrir el editor de slides. Esa disciplina es la que separa una presentación memorable de una genérica.",
    badgeIcon: `<circle cx="42" cy="42" r="34" stroke="#7C5CFF" stroke-width="2.5"/><circle cx="42" cy="42" r="20" stroke="#D9D2FF" stroke-width="2"/><circle cx="42" cy="42" r="4" fill="#7C5CFF"/><path d="M42 8 V16 M42 68 V76 M8 42 H16 M68 42 H76" stroke="#7C5CFF" stroke-width="2.5" stroke-linecap="round"/>`,
    questions: [
      { q: "¿Cuál es la pregunta clave para definir el propósito de una presentación?", options: ["¿Qué quiero que recuerden?", "¿Qué quiero que hagan al terminar?", "¿Qué información técnica debo incluir?"], correct: 1 },
      { q: "¿Qué elemento ayuda a evitar saturación de contenido?", options: ["Elegir una idea central.", "Usar más imágenes.", "Añadir ejemplos adicionales."], correct: 0 },
      { q: "¿Qué pregunta ayuda a filtrar contenido innecesario?", options: ["¿Qué datos son interesantes?", "¿Qué ejemplos me gustan más?", "¿Qué NO necesito decir?"], correct: 2 },
      { q: "¿Qué herramienta se recomienda para organizar la historia antes de diseñar slides?", options: ["Storyboard.", "Lista de temas.", "Agenda detallada."], correct: 0 },
      { q: "¿Qué debe considerarse primero antes de abrir el software de diseño (PowerPoint, Google Slides, entre otros)?", options: ["El diseño visual.", "El propósito.", "El número de slides."], correct: 1 },
      { q: "¿Qué aspecto de la audiencia debe conocerse para ajustar el mensaje?", options: ["Qué buscan y qué necesitan escuchar.", "Su edad promedio.", "Su nivel de experiencia técnica exacta."], correct: 0 }
    ]
  },
  {
    key: "durante",
    num: "02",
    title: "Durante la presentación",
    badgeName: "Presencia Escénica",
    badgeCopy: "Dominas la apertura, la voz y el ritmo que mantienen a una audiencia conectada de principio a fin.",
    badgeIcon: `<path d="M42 12 C50 12 56 18 56 26 V38 C56 46 50 52 42 52 C34 52 28 46 28 38 V26 C28 18 34 12 42 12 Z" stroke="#7C5CFF" stroke-width="2.5"/><path d="M22 34 V38 C22 51 31 61 42 61 C53 61 62 51 62 38 V34" stroke="#D9D2FF" stroke-width="2" stroke-linecap="round"/><path d="M42 61 V72 M32 72 H52" stroke="#D9D2FF" stroke-width="2" stroke-linecap="round"/>`,
    questions: [
      { q: "¿Qué tipo de apertura genera conexión inmediata?", options: ["Un dato sorprendente, una historia breve o una pregunta inicial.", "Explicar la agenda completa.", "Comenzar con definiciones técnicas."], correct: 0 },
      { q: "¿Cuál es el propósito principal del storytelling en una presentación?", options: ["Capturar atención y conectar emocionalmente desde el inicio.", "Reemplazar la explicación de datos técnicos.", "Extender la duración de la presentación para hacerla más memorable."], correct: 0 },
      { q: "¿Qué elemento vocal mejora la claridad del mensaje?", options: ["Hablar rápido para cubrir más contenido.", "Variar el volumen y el ritmo.", "Mantener un tono plano para sonar formal."], correct: 1 },
      { q: "¿Qué hace poderosa una pausa?", options: ["Enfatiza y genera expectativa.", "Permite reorganizar los slides.", "Sirve para cambiar de tema abruptamente."], correct: 0 },
      { q: "¿Qué tipo de humor se recomienda?", options: ["Humor complejo con referencias internas.", "Humor improvisado sin relación al tema.", "Humor natural, breve y relevante."], correct: 2 },
      { q: "¿Qué indica un buen flujo lógico en una presentación?", options: ["Que cada slide responde por qué viene después del anterior.", "Que todos los slides tienen el mismo diseño.", "Que la presentación es extensa y detallada."], correct: 0 }
    ]
  },
  {
    key: "despues",
    num: "03",
    title: "Después de presentar",
    badgeName: "Mejora Continua",
    badgeCopy: "Conviertes cada presentación en aprendizaje: identificas qué funcionó, qué ajustar y cómo dar seguimiento a tu audiencia.",
    badgeIcon: `<path d="M22 42 A20 20 0 1 1 27 55" stroke="#7C5CFF" stroke-width="2.5" fill="none" stroke-linecap="round"/><path d="M22 30 V42 H34" stroke="#7C5CFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M55 26 L62 33 L55 40" stroke="#D9D2FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>`,
    questions: [
      { q: "¿Qué acción se recomienda inmediatamente después de presentar?", options: ["Revisar la ortografía de los slides.", "Identificar conversaciones clave.", "Cambiar el título de la presentación."], correct: 1 },
      { q: "¿Qué pregunta de feedback es más útil?", options: ["¿Te gustó mi presentación?", "¿Qué quedó poco claro?", "¿Cuántos slides usé?"], correct: 1 },
      { q: "¿Qué debe incluir una bitácora de aprendizaje?", options: ["Qué funcionó, qué mejorar, preguntas surgidas, contenido faltante.", "Los nombres de los asistentes.", "La duración exacta de cada sección."], correct: 0 },
      { q: "¿Qué acción fortalece relaciones profesionales después de presentar?", options: ["Cambiar el diseño de los slides.", "Añadir más datos técnicos.", "Enviar los materiales prometidos."], correct: 2 },
      { q: "¿Qué pregunta ayuda a reflexionar sobre tu estilo como presentador?", options: ["¿Qué fue lo más memorable de tu presentación?", "¿Qué colores usé?", "¿Cuántos gráficos incluí?"], correct: 0 },
      { q: "¿Qué hábito distingue a los mejores presentadores?", options: ["Memorizar todos los datos.", "Usar muchos efectos visuales.", "Ser estudiantes permanentes."], correct: 2 }
    ]
  }
];

const INTRO_COPY = {
  heading: "¿Qué tipo de presentador o presentadora eres?",
  desc: "Antes de recorrer el escenario del mundo inmersivo contesta el siguiente desafío y descubre el tipo de presentador o presentadora que eres.",
  resultInstruction: "Anota tu resultado antes de comenzar tu recorrido por el mundo inmersivo y compáralo con tus respuestas al final del recorrido cuando repitas el desafío."
};

const LETTERS = ["A", "B", "C"];
const STORAGE_KEY = "dpi_resultado";
const ALL_QUESTIONS = SECTIONS.flatMap((section, sIdx) =>
  section.questions.map((q, qIdx) => ({ ...q, sectionIndex: sIdx, questionIndexInSection: qIdx }))
);

/* ---------------------------------------------------------
   ESTADO
--------------------------------------------------------- */
let state = {
  currentIndex: 0,       // índice global 0..17
  answers: {},            // { globalIndex: chosenOptionIndex }
  shownBadges: new Set()  // sectionIndex ya mostrado
};

const stage = document.getElementById("stage");
const stationsNav = document.getElementById("stationsNav");

/* ---------------------------------------------------------
   HELPERS DE STORAGE
--------------------------------------------------------- */
function saveResult(score) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ score, total: 18, savedAt: Date.now() }));
    return true;
  } catch (e) { return false; }
}

/* ---------------------------------------------------------
   RENDER: PANTALLA DE INICIO
--------------------------------------------------------- */
function renderStart() {
  stationsNav.style.display = "none";
  stage.innerHTML = `
    <div class="card">
      <div class="eyebrow">Desafío gamificado</div>
      <h1>${INTRO_COPY.heading}</h1>
      <div class="intro-desc">${INTRO_COPY.desc}</div>
      <div class="journey-preview">
        ${SECTIONS.map(s => `
          <div class="journey-step">
            <span class="num">${s.num}</span>
            <span class="label">${s.title}</span>
          </div>
        `).join("")}
      </div>
      <button class="btn btn-primary" id="startBtn">Comenzar desafío</button>
    </div>
  `;
  document.getElementById("startBtn").addEventListener("click", () => {
    state.currentIndex = 0;
    state.answers = {};
    state.shownBadges = new Set();
    renderQuestion();
  });
}

/* ---------------------------------------------------------
   RENDER: PREGUNTA
--------------------------------------------------------- */
function renderQuestion() {
  stationsNav.style.display = "flex";
  const item = ALL_QUESTIONS[state.currentIndex];
  const section = SECTIONS[item.sectionIndex];

  document.querySelectorAll(".station-dot").forEach((dot, i) => {
    dot.classList.toggle("active", i === item.sectionIndex);
    dot.classList.toggle("done", i < item.sectionIndex);
  });

  const alreadyAnswered = state.answers.hasOwnProperty(state.currentIndex);

  stage.innerHTML = `
    <div class="card">
      <div class="eyebrow">${section.num} &middot; ${section.title}</div>
      <h2 class="question-text">${item.q}</h2>
      <div class="options" id="optionsWrap">
        ${item.options.map((opt, i) => `
          <button class="option" data-index="${i}">
            <span class="letter">${LETTERS[i]}</span>
            <span>${opt}</span>
          </button>
        `).join("")}
      </div>
      <div class="btn-row">
        <button class="btn btn-back" id="backBtn">&larr; Volver atrás</button>
        <button class="btn btn-primary" id="nextBtn" disabled>
          ${state.currentIndex === ALL_QUESTIONS.length - 1 ? "Ver resultados" : "Continuar"}
        </button>
      </div>
      <div style="text-align:center; margin-top:14px; font-family:var(--font-mono); font-size:12px; color:var(--muted);">
        Pregunta ${item.questionIndexInSection + 1} de ${section.questions.length}
      </div>
    </div>
  `;

  document.querySelectorAll(".option").forEach(btn => {
    btn.addEventListener("click", () => selectOption(btn, item));
  });
  document.getElementById("backBtn").addEventListener("click", () => {
    if (state.currentIndex > 0) {
      state.currentIndex--;
      renderQuestion();
    } else {
      renderStart();
    }
  });
  document.getElementById("nextBtn").addEventListener("click", advance);

  if (alreadyAnswered) {
    lockOptions(item, state.answers[state.currentIndex]);
    document.getElementById("nextBtn").disabled = false;
  }
}

function lockOptions(item, chosen) {
  document.querySelectorAll(".option").forEach(el => {
    el.classList.add("locked");
    const idx = parseInt(el.dataset.index, 10);
    if (idx === chosen) el.classList.add("selected");
  });
}

function selectOption(btn, item) {
  if (state.answers.hasOwnProperty(state.currentIndex)) return;
  const chosen = parseInt(btn.dataset.index, 10);
  state.answers[state.currentIndex] = chosen;
  lockOptions(item, chosen);
  document.getElementById("nextBtn").disabled = false;
}

function computeScore() {
  return ALL_QUESTIONS.reduce((total, q, i) => total + (state.answers[i] === q.correct ? 1 : 0), 0);
}

function advance() {
  const item = ALL_QUESTIONS[state.currentIndex];
  const isLastInSection = item.questionIndexInSection === SECTIONS[item.sectionIndex].questions.length - 1;

  if (isLastInSection && !state.shownBadges.has(item.sectionIndex)) {
    state.shownBadges.add(item.sectionIndex);
    renderBadge(SECTIONS[item.sectionIndex]);
    return;
  }

  if (state.currentIndex === ALL_QUESTIONS.length - 1) {
    renderResults();
    return;
  }

  state.currentIndex++;
  renderQuestion();
}

/* ---------------------------------------------------------
   RENDER: INSIGNIA
--------------------------------------------------------- */
function renderBadge(section) {
  stage.innerHTML = `
    <div class="card badge-reveal">
      <svg class="badge-icon" viewBox="0 0 84 84" fill="none">${section.badgeIcon}</svg>
      <div class="badge-tag">Insignia desbloqueada</div>
      <div class="badge-name">${section.badgeName}</div>
      <div class="badge-copy">${section.badgeCopy}</div>
      <button class="btn btn-primary" id="continueBtn">
        ${state.currentIndex === ALL_QUESTIONS.length - 1 ? "Ver resultados" : "Continuar a la siguiente estación"}
      </button>
    </div>
  `;
  document.getElementById("continueBtn").addEventListener("click", () => {
    if (state.currentIndex === ALL_QUESTIONS.length - 1) {
      renderResults();
    } else {
      state.currentIndex++;
      renderQuestion();
    }
  });
}

/* ---------------------------------------------------------
   GAUGE SVG
--------------------------------------------------------- */
function gaugeSVG(pct, size = 168) {
  const r = 66;
  const c = 2 * Math.PI * r;
  const offset = c * (1 - pct / 100);
  const cx = size / 2, cy = size / 2;
  return `
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${cx}" cy="${cy}" r="${r}" stroke="rgba(147,125,255,0.15)" stroke-width="10" fill="none"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" stroke="#7C5CFF" stroke-width="10" fill="none"
        stroke-linecap="round"
        stroke-dasharray="${c}" stroke-dashoffset="${offset}"
        transform="rotate(-90 ${cx} ${cy})"/>
      <text x="${cx}" y="${cy - 4}" text-anchor="middle" class="gauge-score">${Math.round(pct)}%</text>
      <text x="${cx}" y="${cy + 18}" text-anchor="middle" class="gauge-label">ÍNDICE DE IMPACTO</text>
    </svg>
  `;
}

/* ---------------------------------------------------------
   RENDER: RESULTADOS
--------------------------------------------------------- */
function renderResults() {
  stationsNav.style.display = "none";
  const score = computeScore();
  const pct = (score / 18) * 100;
  saveResult(score);

  const earnedBadges = SECTIONS.map(s => s);

  stage.innerHTML = `
    <div class="card" style="text-align:center;">
      <div class="eyebrow" style="justify-content:center;">Desafío completado</div>
      <h1>${score} de 18 respuestas correctas</h1>
      <div class="gauge-wrap">${gaugeSVG(pct)}</div>
      <div class="badge-row">
        ${earnedBadges.map(b => `
          <div class="badge-chip">
            <svg viewBox="0 0 84 84">${b.badgeIcon}</svg>
            ${b.badgeName}
          </div>
        `).join("")}
      </div>
      <div class="intro-desc" style="text-align:left;">${INTRO_COPY.resultInstruction}</div>
      <div class="save-note ok">Resultado guardado en este navegador.</div>
      <div class="btn-row" style="margin-top:16px;">
        <button class="btn btn-back" id="backBtn">&larr; Volver atrás</button>
        <button class="btn btn-primary" id="restartBtn">Volver al inicio</button>
      </div>
    </div>
  `;

  document.getElementById("backBtn").addEventListener("click", () => {
    state.currentIndex = ALL_QUESTIONS.length - 1;
    renderQuestion();
  });
  document.getElementById("restartBtn").addEventListener("click", renderStart);
}

/* ---------------------------------------------------------
   INICIO
--------------------------------------------------------- */
renderStart();
</script>
</body>
</html>
