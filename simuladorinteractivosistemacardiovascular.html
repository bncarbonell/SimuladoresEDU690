<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Interactivo: Sistema Cardiovascular</title>
    <style>
        :root {
            --blue-deox: #4a90e2;
            --blue-light: #eef5fc;
            --red-ox: #e35b5b;
            --red-light: #fdf2f2;
            --text: #2c3e50;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --border: #e2e8f0;
            --success: #2ecc71;
            --warning: #e67e22;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 35px;
            padding: 25px;
            background: linear-gradient(135deg, #4a90e2, #e35b5b);
            color: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        header h1 { margin: 0; font-size: 2rem; }
        header p { margin: 8px 0 0 0; opacity: 0.9; }

        .section {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.01);
            border: 1px solid var(--border);
            margin-bottom: 30px;
        }

        h2 {
            color: #34495e;
            margin-top: 0;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 10px;
        }

        /* Estructura del Diagrama Visual del Corazón */
        .heart-diagram {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 600px;
            margin: 30px auto;
        }

        .column-title {
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            padding-bottom: 5px;
            color: #7f8c8d;
        }

        .cardio-part {
            padding: 25px 15px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 2px solid transparent;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }

        .cardio-part:hover {
            transform: scale(1.03);
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        /* Lado Derecho (Sangre desoxigenada - Azul suave) */
        .deox-side {
            background-color: var(--blue-light);
            color: #1a4a75;
            border-color: #bcd4ef;
        }
        .deox-side.active {
            background-color: var(--blue-deox);
            color: white;
            border-color: var(--blue-deox);
        }

        /* Lado Izquierdo (Sangre oxigenada - Rojo suave) */
        .ox-side {
            background-color: var(--red-light);
            color: #7d2626;
            border-color: #f5c6c6;
        }
        .ox-side.active {
            background-color: var(--red-ox);
            color: white;
            border-color: var(--red-ox);
        }
