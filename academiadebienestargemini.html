<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academia de Bienestar para Líderes de RRHH - Simulador de Blueprint</title>
    <style>
        :root {
            --primary-dark: #1e293b;
            --primary-light: #38bdf8;
            --accent-purple: #8b5cf6;
            --neutral-bg: #f8fafc;
            --neutral-card: #ffffff;
            --text-main: #334155;
            --text-muted: #64748b;
            --success: #10b981;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--neutral-bg);
            color: var(--text-main);
            line-height: 1.6;
        }

        header {
            background-color: var(--primary-dark);
            color: white;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--accent-purple);
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        header span {
            color: var(--primary-light);
            font-size: 0.9rem;
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        /* Navigation Map */
        .academy-map {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .map-node {
            background-color: var(--neutral-card);
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            color: var(--text-muted);
        }

        .map-node:hover {
            border-color: var(--primary-light);
            transform: translateY(-2px);
        }

        .map-node.active {
            background-color: var(--primary-dark);
            color: white;
            border-color: var(--accent-purple);
        }

        /* Screen & Cards */
        .screen {
            display: none;
            background-color: var(--neutral-card);
            border-radius: 12px;
            padding: 2.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .screen.active {
            display: block;
        }

        h2 {
            color: var(--primary-dark);
            margin-bottom: 1rem;
            font-size: 1.8rem;
            border-left: 5px solid var(--accent-purple);
            padding-left: 0.5rem;
        }

        p.description {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 1.05rem;
        }

        .section-block {
            margin-bottom: 2.5rem;
            background: #f1f5f9;
            padding: 1.5rem;
            border-radius: 8px;
        }

        h3 {
            margin-bottom: 1rem;
            color: var(--primary-dark);
            font-size: 1.2rem;
        }

        /* Form elements */
        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: var(--primary-dark);
        }

        textarea, input[type="text"], select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1rem;
            color: var(--text-main);
            background-color: white;
        }

        textarea:focus, input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--accent-purple);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: normal;
            cursor: pointer;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            background-color: var(--accent-purple);
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            font-size: 1rem;
        }

        .btn:hover {
            background-color: #7c3aed;
        }

        .btn-secondary {
            background-color: var(--primary-dark);
        }

        .btn-secondary:hover {
            background-color: #0f172a;
        }

        .btn-success {
            background-color: var(--success);
        }

        .btn-success:hover {
            background-color: #059669;
        }

        .flex-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 2rem;
        }

        /* Simulation Box */
        .simulation-box {
            background-color: #ffffff;
            border-left: 4px solid var(--primary-light);
            padding: 1.5rem;
            border-radius: 0 8px
